# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: elph
report_sizes: true
dist: ./release

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

env:
  - CGO_ENABLED=0
  - GOEXPERIMENT=jsonv2
  - NODE_ENV=production
  - VITEST=true

before:
  hooks:
    - go mod download
    - go mod tidy

builds:
  - id: build_elph
    main: ./cmd/elph
    binary: "{{.Os}}_{{.Arch}}/{{.ProjectName}}"
    no_main_check: true
    no_unique_dist_dir: true
    goos: ["darwin", "linux"]
    goarch: ["amd64", "arm64"]
    buildmode: pie
    tags: ["release"]
    flags: ["-trimpath", "-buildvcs=false"]
    ldflags:
      - -w -s -extldflags '-static'
      - -X 'github.com/riipandi/elph/internal/config.AppVersion={{.Tag}}'
      - -X 'github.com/riipandi/elph/internal/config.BuildHash={{.ShortCommit}}'
      - -X 'github.com/riipandi/elph/internal/config.BuildDate={{.Date}}'

archives:
  - formats: [tar.gz]
    ids: [build_elph]
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "v{{ incpatch .Version }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^examples:"
      - "^docs:"
      - "^test:"

release:
  replace_existing_draft: true
  replace_existing_artifacts: true
  use_existing_draft: true
  make_latest: false
  prerelease: true
  mode: replace
  draft: false

  header: |
    ## Release ({{ .Date }})

    Welcome to this new release!

  footer: |
    ## Thanks

    Those were the changes on {{ .Tag }}!

