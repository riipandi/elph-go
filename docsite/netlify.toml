[build.environment]
  GO_VERSION = "1.26.4"
  HUGO_VERSION = "0.163.1"
  NODE_VERSION = "24.16.0"
  NPM_VERSION = "11.13.0"
  TZ = "Asia/Jakarta"

[build]
  publish = "public"
  command = """\
  git config core.quotepath false && \
  hugo build --gc --minify --baseURL "${URL}" && \
	cp schemas/*.json docsite/public/
  """

[[redirects]]
	from = "/*"
	to = "/404/"
	status = 404
